<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NeoCalc | Smart Calculator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <h1>
            <i class="fa-solid fa-calculator"></i>
            NeoCalc
        </h1>

        <p>Smart Calculator | CodeAlpha Frontend Development</p>

    </header>

    <!-- ================= CALCULATOR ================= -->

    <main>

        <div class="calculator">

            <!-- Display -->

            <div class="display">

                <input
                    type="text"
                    id="screen"
                    placeholder="0"
                    readonly>

            </div>

            <!-- Buttons -->

            <div class="buttons">

                <button class="operator clear">C</button>

                <button class="operator delete">⌫</button>

                <button class="operator">%</button>

                <button class="operator">/</button>

                <button>7</button>

                <button>8</button>

                <button>9</button>

                <button class="operator">*</button>

                <button>4</button>

                <button>5</button>

                <button>6</button>

                <button class="operator">-</button>

                <button>1</button>

                <button>2</button>

                <button>3</button>

                <button class="operator">+</button>

                <button class="zero">0</button>

                <button>.</button>

                <button class="equal">=</button>

            </div>

        </div>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 NeoCalc

            | Designed by Kanishka Zopate

        </p>

    </footer>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
